[colors]
#background = ${xrdb:color0:#222}
#foreground = ${xrdb:color7:#222}
#background-alt = ${xrdb:color10:#222}
#foreground-alt = ${xrdb:color6:#222}
#primary = ${xrdb:color1:#222}
#secondary = ${xrdb:color2:#222}
#alert = ${xrdb:color3:#222}
#disabled = ${xrdb:color8:#222}
#border = ${xrdb:color6:#222}
background = #222222
foreground = #ffffff      ; <- white text
background-alt = #333333
foreground-alt = #cccccc
primary = #ff5555
secondary = #50fa7b
alert = #ffb86c
disabled = #555555
border = #444444


##################
#       BAR      #
##################

################################################################################

# Left Bar
[bar/left]
background = ${colors.background}
foreground = ${colors.foreground}

width = 12%
height = 36
radius = 8
bottom = false
dpi = 96
line-size = 3pt
border-size = 3px
border-color = ${colors.border}
offset-x = 1% 
offset-y = 10
override-redirect = false
wm-restack = bspwm
padding-left = 0
padding-right = 0
# module-margin = 1

font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=12;2"
font-1 = "Font Awesome 5 Free:style=Solid:pixelsize=12;1"
font-2 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=14;5"

modules-left =  lb powermenu sep xworkspaces sep hz-switch rb

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

