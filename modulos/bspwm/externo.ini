#################################################################################

# Center Bar
[bar/center]
background = ${colors.background}
foreground = ${colors.foreground}

width = 12%
height = 36
radius = 8
bottom = false
pseudo-transparency = true
dpi = 96
line-size = 3pt
border-size = 3px
border-color = ${colors.border}
offset-x = 42.5%  
offset-y = 10
override-redirect = false
wm-restack = bspwm
padding-left = 0
padding-right = 0
# module-margin = 1

font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=12;2"
font-1 = "Font Awesome 5 Free:style=Solid:pixelsize=12;1"
font-2 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=25;5"


modules-center = lb xwindow rb 

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


##########################################################################

# Right Bar
[bar/right]
background = ${colors.background}
foreground = ${colors.foreground}

width = 30%
height = 36
radius = 8
bottom = false
pseudo-transparency = true
dpi = 96
line-size = 3pt
border-size = 3px
border-color = ${colors.border}
offset-x = 69%
offset-y = 10
override-redirect = false
wm-restack = bspwm
padding-left = 1
padding-right = 1
# module-margin = 1

font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=12;2"
font-1 = "Font Awesome 5 Free:style=Solid:pixelsize=20;1"
font-2 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=14;1"


modules-right =  lb brillo sep memory sep cpu sep pipewire sep wireless-network sep date sep battery rb 

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


#####################
#      MODULES      #
#####################

# Powermenu
[module/powermenu]
type = custom/text
content = "Ó°É "

# Workspaces
[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
#label-active-underline= ${colors.primary}
label-active-background= ${colors.background-alt}
label-active-foreground= ${colors.background}
label-active-padding = 1

label-occupied =
label-occupied-padding = 1

label-urgent = 
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty =
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/hz-switch]
type = custom/script
exec = ~/.config/polybar/scripts/hz-estado
interval = 1
click-left = ~/.config/polybar/scripts/hz-switch
format-padding = 1



# Window Name
[module/xwindow]
type = internal/xwindow
label = %class%

[module/brillo]
type = custom/script
exec = ~/.config/polybar/scripts/brillo-estado
interval = 1
format-prefix = "ÔĒĘ  "
click-left = ~/.config/polybar/scripts/subir-brillo
click-right = ~/.config/polybar/scripts/bajar-brillo
format-padding = 1

# Memory
[module/memory]
type = internal/memory
interval = 5
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.foreground-alt}
label = %percentage_used:4%%


# CPU
[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "Ôíľ"
format-prefix-foreground = ${colors.foreground-alt}
label = %percentage:4%%


# Volume
[module/pipewire]
type = custom/script
exec = ~/.config/polybar/scripts/audio-estado
interval = 0.1
format-padding = 1
scroll-up = ~/.config/polybar/scripts/subir-audio
scroll-down = ~/.config/polybar/scripts/bajar-audio
click-left = ~/.config/polybar/scripts/silenciar-audio

# WiFi
[module/wireless-network]
type = internal/network
interface = wlp6s0
interface-type = wireless
format-connected = <ramp-signal>
format-connected-foreground = ${colors.foreground-alt}
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.foreground-alt}
label-disconnected =  ůį§≠
interval = 5.0

ramp-signal-0 = "ůį§Į "
ramp-signal-1 = "ůį§ü "
ramp-signal-2 = "ůį§Ę " 
ramp-signal-3 = "ůį§• "
ramp-signal-4 = "ůį§® "


# Date
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}


# Battery
[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
poll-interval = 5
format-charging = ‚ö° <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀĺ
ramp-capacity-3 = ůįāÄ
ramp-capacity-4 = ůįĀĻ


################
#  Formatting  #
################

[module/lb]
type = custom/text
content = " [ "
content-foreground = ${colors.primary}
content-padding = 0


[module/rb]
type = custom/text
content = " ] "
content-foreground = ${colors.primary}
content-padding = 0


[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.disabled}
content-padding = 0


[settings]
screenchange-reload = true
pseudo-transparency = true



; vim:ft=dosini
